<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css"> <!-- You can create a custom CSS file for additional styling -->
    <title>Family Tree</title>
</head>
<body>

    <!-- Header -->
    <header class="bg-dark text-white text-center py-4">
        <h1>My Family Tree</h1>
        <p class="lead">Explore the branches of our family</p>
    </header>

    <!-- Content -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-6">
                <!-- Family Tree -->
                <h2 class="mt-4 mb-3">Family Tree</h2>
                <div id="familyTree"></div>
            </div>
            <div class="col-md-6">
                <!-- Detail Page -->
                <div id="detailPage" class="d-none">
                    <h2 class="text-center my-4">Family Member Details</h2>
                    <div id="memberDetails"></div>
                    <button class="btn btn-primary mt-3" onclick="goBack()">Back to Family Tree</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2023 My Family Tree</p>
    </footer>

    <!-- Bootstrap and jQuery Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.min.js"></script>
    <!-- Your Custom JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
